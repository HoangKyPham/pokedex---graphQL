query GetPokemonByType($limit: Int, $offset: Int, $typeName: String!) {
pokemon_v2_pokemon(
limit: $limit
offset: $offset
where: {
pokemon_v2_pokemontypes: {
pokemon_v2_type: {
name: { _eq: $typeName }
}
}
}
) {
id
name
pokemon_v2_pokemontypes {
pokemon_v2_type {
name
}
}
pokemon_v2_pokemonstats {
base_stat
pokemon_v2_stat {
name
}
}
pokemon_v2_pokemonsprites {
sprites
}
}

pokemon_v2_pokemon_aggregate(
where: {
pokemon_v2_pokemontypes: {
pokemon_v2_type: {
name: { _eq: $typeName }
}
}
}
) {
aggregate {
count
}
}
}